ollama_base_url: "http://localhost:11434"
ollama_general_model: "qwen2.5:7b"
ollama_coder_model: "qwen2.5-coder:7b"
# OJO: hoy el router es 100% regex (routing_rules.py); este modelo queda reservado
# para el futuro router LLM de segunda pasada (fase F6 de la auditoria).
ollama_router_model: "llama3.2:latest"
# bge-m3 para TODO (RAG y Vane): un solo modelo de embeddings residente evita
# que Ollama desaloje modelos en cada cambio RAG<->busqueda web (16 GB RAM).
ollama_embed_model: "bge-m3"
# En CPU un prompt largo (RAG con contexto) tarda 1-3 min en prompt eval; 120s cortaba.
ollama_timeout: 300
# Chunks con distancia mayor a esto se descartan (anti-alucinacion).
# La metrica es L2 al cuadrado de Chroma (default) con bge-m3. Ca